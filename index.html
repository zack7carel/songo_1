<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Songo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- =============== PAGE AUTH =============== -->
<div class="page active" id="page-auth">
  <div class="auth-wrap">
    <div>
      <div class="home-title">Songo</div>
      <div class="home-subtitle">Jeu de semailles Ekang · Cameroun</div>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Connexion</button>
        <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Inscription</button>
      </div>

      <div id="auth-error" class="auth-error" style="display:none;"></div>

      <!-- Connexion -->
      <div id="form-login">
        <div class="field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="vous@exemple.com" />
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="btn-login" onclick="handleLogin()">Se connecter</button>
        <button class="btn-ghost" onclick="handleGuest()">Continuer sans compte</button>
      </div>

      <!-- Inscription -->
      <div id="form-register" style="display:none;">
        <div class="field">
          <label>Pseudo</label>
          <input type="text" id="reg-name" placeholder="MonPseudo" />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="vous@exemple.com" />
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" id="reg-password" placeholder="8 caractères minimum" />
        </div>
        <button class="btn-primary" id="btn-register" onclick="handleRegister()">Créer un compte</button>
        <button class="btn-ghost" onclick="handleGuest()">Continuer sans compte</button>
      </div>
    </div>
  </div>
</div>

<!-- =============== PAGE ACCUEIL =============== -->
<div class="page" id="page-home">
  <div class="home-wrap">
    <div class="home-header">
      <div>
        <div class="home-title">Songo</div>
        <div class="home-subtitle">Jeu de semailles Ekang · Cameroun</div>
      </div>
      <div class="user-badge" id="user-badge">
        <span id="user-name-display"></span>
        <button class="btn-logout" onclick="handleLogout()" title="Déconnexion">↩</button>
      </div>
    </div>

    <div class="home-board-preview">
      <div class="home-row">
        <div class="home-pit">5</div><div class="home-pit">5</div>
        <div class="home-pit">5</div><div class="home-pit">5</div>
        <div class="home-pit">5</div><div class="home-pit">5</div>
        <div class="home-pit">5</div>
      </div>
      <div class="home-row">
        <div class="home-pit">5</div><div class="home-pit">5</div>
        <div class="home-pit">5</div><div class="home-pit">5</div>
        <div class="home-pit">5</div><div class="home-pit">5</div>
        <div class="home-pit">5</div>
      </div>
    </div>

    <div class="home-actions">
      <button class="btn-primary"   onclick="startNewGame()">Nouvelle partie</button>
      <button class="btn-secondary" onclick="showPage('page-history')">Historique des parties</button>
    </div>
  </div>
</div>

<!-- =============== PAGE HISTORIQUE =============== -->
<div class="page" id="page-history">
  <div class="hist-header">
    <button class="back-btn" onclick="showPage('page-home')" title="Retour">←</button>
    <span class="hist-title">Historique</span>
    <span class="hist-count" id="hist-count"></span>
  </div>
  <div class="stats-row" id="stats-row" style="display:none;">
    <div class="stat-card"><div class="stat-val" id="stat-played">0</div><div class="stat-lbl">Parties</div></div>
    <div class="stat-card win"><div class="stat-val" id="stat-wins">0</div><div class="stat-lbl">Victoires</div></div>
    <div class="stat-card loss"><div class="stat-val" id="stat-losses">0</div><div class="stat-lbl">Défaites</div></div>
    <div class="stat-card draw"><div class="stat-val" id="stat-draws">0</div><div class="stat-lbl">Nuls</div></div>
  </div>
  <div id="hist-content"></div>
</div>

<!-- =============== PAGE JEU =============== -->
<div class="page" id="page-game">
  <div class="game-header">
    <button class="back-btn" onclick="confirmLeave()" title="Accueil">←</button>
    <span class="game-title">Songo</span>
  </div>

  <div class="scores">
    <div class="score-card"><div class="score-label">Joueur 1</div><div class="score-val" id="sv1">0</div></div>
    <div class="score-card"><div class="score-label">Joueur 2</div><div class="score-val" id="sv2">0</div></div>
  </div>

  <div class="player-row" id="p2row">Joueur 2 <span id="p2hint"></span></div>
  <div class="pits" id="top-row"></div>
  <div class="separator"></div>
  <div class="pits" id="bot-row"></div>
  <div class="player-row" id="p1row">Joueur 1 <span id="p1hint"></span></div>

  <div class="msg" id="msg">Tour du Joueur 1</div>
  <button class="restart-btn" onclick="confirmRestart()">Nouvelle partie</button>
</div>

<!-- =============== MODALE FIN DE PARTIE =============== -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-emoji"      id="modal-emoji">🏆</div>
    <div class="modal-title"      id="modal-title">Joueur 1 gagne !</div>
    <div class="modal-sub"        id="modal-sub">Score final</div>
    <div class="modal-scores-row" id="modal-scores-row"></div>
    <div class="modal-reason"     id="modal-reason"></div>
    <div class="modal-actions">
      <button class="btn-primary"   onclick="startNewGame()">Nouvelle partie</button>
      <button class="btn-secondary" onclick="goHome()">Retour à l'accueil</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
